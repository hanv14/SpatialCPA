name: bench_spatialcpa
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - scikit-learn>=1.3
  - h5py>=3.9
  - pytorch>=2.0
  - pip
  - pip:
    - anndata>=0.10
    - scanpy>=1.10
    - tqdm
    # SpatialCPA itself is imported from the `spatialcpa/` package at the
    # repository root (one level above benchmark-pbya) — no pip install needed.
    # The wrapper adds it to sys.path automatically; override with
    # SPATIALCPA_ROOT if the layout differs.
